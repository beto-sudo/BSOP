name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript — typecheck
        run: npm run typecheck

      # Corremos con coverage para que el threshold de `vitest.config.ts`
      # bita en CI (configurado gradual en Sprint 3 de tech-debt-h1-2026:
      # 30% lines/statements, 65% functions, 75% branches en Sprint 3A).
      - name: Vitest — unit tests + coverage threshold
        run: npm run test:coverage

      - name: ESLint
        run: npm run lint

      - name: Prettier — check
        run: npm run format:check

      # Verifica que docs/strategy/INITIATIVES.md (tabla Activas) sigue en sync
      # con los headers de docs/planning/*.md. Si alguien editó la tabla a mano,
      # o promovió/cambió el estado de una iniciativa sin correr el generador,
      # este step falla y pide correr `npm run initiatives:gen`. No necesita
      # secrets — solo lee archivos del repo. Iniciativa cross-session-coordination.
      - name: Initiatives index — drift check
        run: npm run initiatives:check

      # El drift de SCHEMA_REF se valida en el workflow `schema-check.yml`
      # (iniciativa derivados-sin-drift): regenera contra una shadow DB
      # construida desde las migraciones del repo, NO contra prod. Es
      # determinista por rama y no depende del secret SUPABASE_DB_URL ni del
      # estado de prod. Se quitó de aquí para que prod adelantado/atrasado deje
      # de romper el job `quality` de PRs ajenos.
