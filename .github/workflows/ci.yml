name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript — typecheck
        run: npm run typecheck

      - name: Vitest — unit tests
        run: npm run test:run

      - name: ESLint
        run: npm run lint

      - name: Prettier — check
        run: npm run format:check

      # Verifica que supabase/SCHEMA_REF.md coincide con el schema real de la
      # DB. Si alguien aplicó una migración sin regenerar el MD (o lo editó a
      # mano), este step falla y pide correr `npm run schema:ref`.
      # Requiere el secret SUPABASE_DB_URL (Settings → Secrets → Actions).
      # Si el secret no está configurado, el step se salta con un warning
      # en lugar de fallar, para no bloquear PRs hasta que esté listo.
      - name: Schema reference — drift check
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning::SUPABASE_DB_URL secret no configurado — saltando schema:check."
            echo "Agrégalo en Settings → Secrets and variables → Actions para habilitar el guard."
            exit 0
          fi
          npm run schema:check
