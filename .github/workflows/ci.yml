name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript — typecheck
        run: npm run typecheck

      # Corremos con coverage para que el threshold de `vitest.config.ts`
      # bita en CI (configurado gradual en Sprint 3 de tech-debt-h1-2026:
      # 30% lines/statements, 65% functions, 75% branches en Sprint 3A).
      - name: Vitest — unit tests + coverage threshold
        run: npm run test:coverage

      - name: ESLint
        run: npm run lint

      - name: Prettier — check
        run: npm run format:check

      # Valida los HEADERS de docs/planning/*.md (slug == archivo, y que cada
      # iniciativa activa tenga nombre/Empresas/Schemas/Próximo hito/Última
      # actualización). NO compara la tabla `## Activas` de INITIATIVES.md: esa
      # se regenera en `main` post-merge (initiatives-regen.yml), no en las
      # ramas — así INITIATIVES.md deja de ser hotspot de conflictos entre
      # sesiones (iniciativa derivados-sin-drift, Sprint 2). Solo lee archivos.
      - name: Initiatives headers — validate
        run: npm run initiatives:validate

      # El drift de SCHEMA_REF se valida en el workflow `schema-check.yml`
      # (iniciativa derivados-sin-drift): regenera contra una shadow DB
      # construida desde las migraciones del repo, NO contra prod. Es
      # determinista por rama y no depende del secret SUPABASE_DB_URL ni del
      # estado de prod. Se quitó de aquí para que prod adelantado/atrasado deje
      # de romper el job `quality` de PRs ajenos.
