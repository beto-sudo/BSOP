name: DB Types

# Regenera `types/supabase.ts` desde las MIGRACIONES del repo (shadow DB), no
# contra prod (iniciativa derivados-sin-drift). Determinista y sin secrets de prod.
#
# Se ejecuta:
#   - Manualmente desde la pestaña Actions (workflow_dispatch)
#   - Automáticamente cada lunes a las 07:00 UTC (como red de seguridad)
#
# Cuando detecta cambios en los tipos vs las migraciones, abre un PR automático a `main`.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

concurrency:
  group: db-types-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate supabase types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Levantar shadow DB (aplica las migraciones desde cero)
        run: |
          # Modelo derivados-sin-drift: los types se generan desde las migraciones
          # del repo (shadow), NO contra prod. Determinista y sin secrets de prod.
          supabase start || {
            echo "::error::supabase start falló — alguna migración no reproduce desde cero. Ver GOVERNANCE.md §1/§3."
            exit 1
          }

      - name: Generate TypeScript types (all schemas, desde la shadow)
        run: |
          supabase gen types typescript --local \
            --schema public \
            --schema core \
            --schema erp \
            --schema rdb \
            --schema health \
            --schema playtomic \
            --schema dilesa \
            --schema maquinaria \
            --schema peptides \
            --schema sanren \
            > types/supabase.ts.new

          # Anteponer header con metadatos
          {
            echo "// =============================================================================="
            echo "// Auto-generated Supabase database types."
            echo "// Last regenerated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "// Fuente: migraciones del repo (shadow DB), no prod."
            echo "// Schemas: public, core, erp, rdb, health, playtomic, dilesa, maquinaria, peptides, sanren"
            echo "//"
            echo "// DO NOT EDIT BY HAND. Regenerate via:"
            echo "//   - GitHub Actions: trigger 'DB Types' workflow manually"
            echo "//   - Local: supabase start && npm run db:types  (ver GOVERNANCE.md §3)"
            echo "// =============================================================================="
            echo ""
            cat types/supabase.ts.new
          } > types/supabase.ts

          rm types/supabase.ts.new

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet types/supabase.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes in supabase types."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Supabase types changed."
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/supabase-types-autogen
          base: main
          commit-message: 'chore(types): regenerate supabase database types'
          title: 'chore(types): regenerate supabase database types'
          body: |
            Automated regeneration of `types/supabase.ts` from the live Supabase schema.

            **Schemas incluidos:** public, core, erp, rdb, health, playtomic, dilesa, maquinaria, peptides

            Este PR lo abrió el workflow `.github/workflows/db-types.yml`.
            Revisa el diff con cuidado antes de mergear — cualquier cambio aquí
            refleja un cambio real en la base de datos.
          labels: |
            automated
            types
          delete-branch: true
