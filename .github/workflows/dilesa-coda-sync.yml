name: DILESA Coda Sync

# Sync Coda → BSOP del schema dilesa. APAGADO como daily desde el
# 2026-06-11: cutover de ventas completado (BSOP es master; Coda quedó
# read-only para consulta). Antes ya se había cortado construcción
# (2026-06-09, cutover de obra). Queda SOLO como workflow manual para
# traer rezagos puntuales de Coda si llegara a aparecer captura vieja.
# Manda email con resumen vía Resend (siempre — éxito o fallo).
#
# Corridas manuales: sin inputs corre ventas + expediente + puente CxC;
# input `construccion` re-incluye los 6 scripts de construcción; input
# `full` corre todo (portafolio + construcción + ventas + expediente).
#
# Idempotente: las ventas creadas nativas en BSOP (sin coda_row_id) se
# preservan. Los adjuntos de expediente solo se descargan/suben si son
# nuevos (dedup por metadata->>'coda_source_url').
#
# Se ejecuta:
#   - SOLO manualmente desde la pestaña Actions (workflow_dispatch)
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   - CODA_API_KEY                       — coda.io API token
#   - NEXT_PUBLIC_SUPABASE_URL           — https://<ref>.supabase.co
#   - SUPABASE_SERVICE_ROLE_KEY          — service role (bypasses RLS)
#   - RESEND_API_KEY                     — para enviar el email de reporte
#   - NOTIFY_EMAIL                       — destinatario del reporte (ej. beto@anorte.com)
#   - SYNC_FROM_EMAIL  (opcional)        — From: header (default: BSOP Sync <sync@anorte.com>)
#
# Runbook completo: docs/runbooks/dilesa-coda-sync.md

on:
  workflow_dispatch:
    inputs:
      construccion:
        description: 'Incluir los 6 scripts de construcción (cortados del daily el 2026-06-09) — para rezagos puntuales'
        type: boolean
        default: false
      full:
        description: 'Refresh completo (portafolio + construcción + ventas + expediente)'
        type: boolean
        default: false
  # schedule: apagado 2026-06-11 — cutover de ventas (S6 dilesa-ventas-expediente).
  # El daily corría '0 9 * * *' (03:00 CST). BSOP es master; Coda read-only.

concurrency:
  group: dilesa-coda-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Coda → BSOP
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CODA_API_KEY: ${{ secrets.CODA_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
      SYNC_FROM_EMAIL: ${{ secrets.SYNC_FROM_EMAIL }}
      FULL: ${{ inputs.full && '1' || '' }}
      CONSTRUCCION: ${{ inputs.construccion && '1' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync wrapper
        run: npx tsx scripts/run-dilesa-sync.ts

      # Si el wrapper falla o el job es cancelado por timeout, manda un email
      # breve directo (sin pasar por el wrapper que ya murió).
      - name: Notify on failure or cancel
        if: failure() || cancelled()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS: ${{ job.status }}
        run: |
          curl -sS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"${SYNC_FROM_EMAIL:-BSOP Sync <onboarding@resend.dev>}\",
              \"to\": [\"$NOTIFY_EMAIL\"],
              \"subject\": \"✗✗ Sync DILESA Coda→BSOP — $STATUS\",
              \"html\": \"<p>El job de sync terminó con estado <b>$STATUS</b> antes de poder generar el reporte normal.</p><p><a href='\\\"$RUN_URL\\\"'>Ver log en GitHub Actions</a></p>\"
            }" || echo "Resend POST falló — revisa secrets RESEND_API_KEY + NOTIFY_EMAIL"
