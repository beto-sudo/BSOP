name: DB Drift Check

# Corre supabase/scripts/drift-check.sql contra la DB en vivo y reporta
# drifts conocidos (policies redundantes, indexes duplicados, RLS deshabilitado,
# bloat alto).
#
# Política de fallo:
#   - PRs              → informativo: comenta output pero no falla el job
#                        (la migración del PR puede ser justamente la cura;
#                        el comment alcanza para que el reviewer lo vea)
#   - Schedule semanal → falla si detecta ALERT (alguien dejó drift sin atender)
#   - workflow_dispatch → falla si detecta ALERT (chequeo on-demand)
#
# Triggers:
#   - PRs que tocan supabase/migrations/** o el script de drift
#   - Manual desde la pestaña Actions
#   - Schedule semanal (viernes 10:00 UTC ≈ 4:00 AM CT) — sanity check pasivo
#
# Requisitos:
#   - Secret SUPABASE_DB_URL (pooler connection string del proyecto)
#     Settings -> Secrets and variables -> Actions

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/scripts/drift-check.sql'
      - '.github/workflows/drift-check.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 5'

concurrency:
  group: drift-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Run drift-check.sql
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Check filename↔version alignment
        # Compara los archivos en supabase/migrations/ contra
        # supabase_migrations.schema_migrations. Whitelist: archivos
        # bootstrap que viven en disco sin counterpart en DB
        # (corren solo en Preview/DR/local, ver GOVERNANCE.md §4).
        # ::warning:: no falla el job — para hacerlo bloqueante cambiar
        # a ::error:: + exit 1.
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Secret SUPABASE_DB_URL is not configured."
            exit 1
          fi

          # Disk
          ls supabase/migrations/*.sql 2>/dev/null \
            | xargs -I{} basename {} .sql \
            | sort -u > /tmp/disk.txt

          # DB
          psql "$SUPABASE_DB_URL" -tAc \
            "SELECT version || '_' || name FROM supabase_migrations.schema_migrations ORDER BY 1" \
            | sort -u > /tmp/db.txt

          # Whitelist: archivos esperados en uno solo de los dos lados.
          # Ver GOVERNANCE.md §4 / §5.
          cat > /tmp/whitelist.txt <<'WHITELIST_EOF'
          20260101000000_bootstrap_schemas
          20260101000001_pre_migration_bootstrap
          20260101000002_pre_migration_bootstrap_health
          20260101000003_pre_migration_bootstrap_public
          20260325_waitry_inbound_processing
          20260405185048_fix_views_timezone
          20260405185144_fix_views_timezone_v2
          20260405192805_fix_views_duplicates
          20260406153055_fix_view_op_date
          20260406153837_create_30d_window_views_for_coda
          20260407004101_fix_v_cortes_totales_30d_v4
          20260407005923_fix_v_cortes_totales_30d_v5
          20260407022322_cortes_schema_updates
          20260407022500_create_upsert_corte_fn
          20260407024912_setup_sync_cortes_cron
          20260407025300_upsert_corte_with_caja_id
          20260408000000_rdb_consolidation
          20260417105758_legacy_cleanup_plan_a_archive_tables_and_drop_30d_views_2026_04_17
          WHITELIST_EOF
          # strip leading whitespace (heredoc indents)
          sed -i 's/^ *//' /tmp/whitelist.txt

          # Disk-only que NO esté en whitelist (bootstrap files no aparecen
          # acá porque ya están registrados en schema_migrations).
          comm -23 /tmp/disk.txt /tmp/db.txt | grep -v -F -x -f /tmp/whitelist.txt > /tmp/disk-only.txt || true
          # DB-only que NO esté en whitelist (los 14 históricos legacy-refs sí).
          comm -13 /tmp/disk.txt /tmp/db.txt | grep -v -F -x -f /tmp/whitelist.txt > /tmp/db-only.txt || true

          if [ -s /tmp/disk-only.txt ] || [ -s /tmp/db-only.txt ]; then
            echo "::warning::Filename↔version mismatch detected. Ver GOVERNANCE.md §4."
            if [ -s /tmp/disk-only.txt ]; then
              echo "::warning::Disk files sin DB record (no whitelisted):"
              sed 's/^/::warning::  /' /tmp/disk-only.txt
            fi
            if [ -s /tmp/db-only.txt ]; then
              echo "::warning::DB records sin archivo en disk:"
              sed 's/^/::warning::  /' /tmp/db-only.txt
            fi
          else
            echo "Filename↔version: clean."
          fi

      - name: Run drift-check
        id: drift
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Secret SUPABASE_DB_URL is not configured."
            exit 1
          fi

          psql "$SUPABASE_DB_URL" -f supabase/scripts/drift-check.sql \
            > /tmp/drift-output.txt 2>&1 || true

          {
            echo 'output<<DRIFTEOF'
            cat /tmp/drift-output.txt
            echo 'DRIFTEOF'
          } >> "$GITHUB_OUTPUT"

          if grep -q '^ALERT' /tmp/drift-output.txt; then
            echo "has_alert=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.drift.outputs.output }}`;
            const hasAlert = `${{ steps.drift.outputs.has_alert }}` === 'true';
            const title = hasAlert ? '🔴 Drift check: ALERTS' : '✅ Drift check: clean';
            const body = `**${title}**\n\n\`\`\`\n${output.slice(0, 60000)}\n\`\`\``;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Print summary
        run: |
          cat /tmp/drift-output.txt

      - name: Fail if ALERT present (schedule + manual only)
        if: steps.drift.outputs.has_alert == 'true' && github.event_name != 'pull_request'
        run: |
          echo "::error::drift-check.sql reported ALERT(s). See output above."
          exit 1

      - name: Note ALERTs on PR (informational)
        if: steps.drift.outputs.has_alert == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::warning::drift-check.sql reported ALERT(s). PR runs are informational — see comment for detail."
