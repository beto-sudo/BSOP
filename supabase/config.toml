# BSOP — supabase config
#
# Mantener completo es requisito para que `supabase db push` corra desde local
# sin pedir flags extras. Si está incompleto, los devs caen al MCP
# `apply_migration` y eso desincroniza filename↔version (ver GOVERNANCE.md §4).

project_id = "ybklderteyhuugzfmxbi"

[db]
major_version = 17

[api]
enabled = true
schemas = ["public", "core", "erp", "rdb", "health", "playtomic", "dilesa", "maquinaria"]

[functions.playtomic-sync]
enabled = true
verify_jwt = true
import_map = "./functions/playtomic-sync/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/playtomic-sync/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/playtomic-sync/*.html" ]
